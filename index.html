<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پاکیزه آنلاین - خشکشویی و اتوشویی</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f1e;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --ink: #ffffff;
            --ink-soft: rgba(255, 255, 255, 0.7);
            --primary: #667eea;
            --primary-dark: #5568d3;
            --primary-glow: rgba(102, 126, 234, 0.5);
            --accent: #f093fb;
            --accent-glow: rgba(240, 147, 251, 0.5);
            --success: #4ade80;
            --success-glow: rgba(74, 222, 128, 0.4);
            --warning: #fbbf24;
            --danger: #f87171;
            --info: #60a5fa;
            --violet: #a78bfa;
            --border: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            color-scheme: dark;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(240, 147, 251, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(74, 222, 128, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app-root { position: relative; z-index: 1; min-height: 100vh; }
        .mono { font-family: 'IBM Plex Mono', 'Vazirmatn', monospace; direction: ltr; unicode-bidi: plaintext; }
        ::selection { background: var(--primary); color: white; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
        input, select, textarea { font-family: inherit; color-scheme: dark; }

        select {
            background-color: rgba(20, 20, 40, 0.9) !important;
            color: white !important;
        }
        select option {
            background-color: #1a1a2e !important;
            color: white !important;
            padding: 8px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: var(--surface-hover);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
            animation: float 20s infinite ease-in-out;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: var(--accent); bottom: -150px; right: -150px; animation-delay: 5s; }
        .orb-3 { width: 300px; height: 300px; background: var(--success); top: 50%; left: 50%; animation-delay: 10s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 600;
            font-size: 14.5px;
            border: 1px solid transparent;
            white-space: nowrap;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 15px var(--primary-glow);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); }

        .btn-accent {
            background: linear-gradient(135deg, var(--accent) 0%, #e879f9 100%);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .btn-accent:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--accent-glow); }

        .btn-ghost {
            background: var(--glass-bg);
            color: var(--ink);
            border: 1px solid var(--glass-border);
        }
        .btn-ghost:hover { background: var(--surface-hover); border-color: rgba(255, 255, 255, 0.3); }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, #ef4444 100%);
            color: white;
        }

        .btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 10px; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .input, .select, .textarea {
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--ink);
            font-size: 14px;
            transition: all 0.3s;
        }
        .input:focus, .select:focus, .textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .label {
            font-size: 13px;
            color: var(--ink-soft);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 999px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 8px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 var(--primary-glow); }
            50% { box-shadow: 0 0 0 15px rgba(102, 126, 234, 0); }
        }
        .animate-pulse { animation: pulse 2s infinite; }

        /* Landing */
        .landing {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }
        .landing-header { text-align: center; margin-bottom: 50px; max-width: 600px; }
        .logo-stamp {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 8px 20px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 20px;
            transform: rotate(-2deg);
        }
        .landing-title {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 50%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.3;
        }
        .landing-subtitle { font-size: 16px; color: var(--ink-soft); line-height: 1.8; }

        .role-cards { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; }
        .role-card {
            width: 240px;
            padding: 32px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .role-card:hover { transform: translateY(-5px); }
        .role-card.selected {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px var(--primary-glow);
        }
        .role-icon { font-size: 48px; margin-bottom: 16px; display: block; }
        .role-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
        .role-desc { font-size: 13px; color: var(--ink-soft); line-height: 1.6; }

        .login-panel { width: 420px; max-width: 100%; padding: 32px; }
        .login-tabs { display: flex; gap: 12px; margin-bottom: 24px; }

        /* App Shell */
        .app-shell { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--glass-border);
            padding: 24px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .sidebar-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
        .logo-icon {
            width: 42px; height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .logo-text { font-size: 17px; font-weight: 800; }

        .user-card {
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .user-name { font-size: 14px; font-weight: 700; }
        .user-role { font-size: 12px; color: var(--ink-soft); }

        .nav-links { display: flex; flex-direction: column; gap: 6px; }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: var(--ink-soft);
            transition: all 0.3s;
            text-align: right;
            width: 100%;
        }
        .nav-link:hover { background: var(--surface-hover); color: var(--ink); }
        .nav-link.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .nav-divider { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }

        .main-content { flex: 1; min-width: 0; padding: 32px; }
        .page-header { margin-bottom: 32px; }
        .page-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, var(--ink-soft) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .page-subtitle { color: var(--ink-soft); font-size: 14px; }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card { padding: 24px; display: flex; align-items: center; gap: 16px; }
        .stat-icon {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
        }
        .stat-label { font-size: 13px; color: var(--ink-soft); font-weight: 600; margin-bottom: 4px; }
        .stat-value { font-size: 24px; font-weight: 800; }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.4s;
            pointer-events: auto;
        }
        .toast.error {
            background: linear-gradient(135deg, var(--danger) 0%, #ef4444 100%);
        }

        /* Cards & Lists */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .item-card {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .item-card:hover { transform: translateY(-3px); }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .qty-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .qty-btn:hover { background: var(--primary); color: white; }
        .qty-display { min-width: 30px; text-align: center; font-weight: 700; font-size: 16px; }

        /* Stepper */
        .stepper {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .step-number {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            font-weight: 700;
            background: var(--surface);
            color: var(--ink-soft);
            border: 2px solid var(--border);
            transition: all 0.3s;
        }
        .step.active .step-number {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border-color: transparent;
        }
        .step.done .step-number {
            background: var(--success);
            color: white;
            border-color: transparent;
        }
        .step-label {
            font-size: 13px;
            color: var(--ink-soft);
            font-weight: 500;
            white-space: nowrap;
        }
        .step.active .step-label { color: var(--ink); font-weight: 700; }
        .step-line {
            width: 40px;
            height: 2px;
            background: var(--border);
            margin: 0 5px;
            flex-shrink: 0;
        }
        .step-line.done { background: var(--success); }

        /* Table */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            padding: 14px 16px;
            text-align: right;
            font-size: 12px;
            font-weight: 700;
            color: var(--ink-soft);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .data-table tr:hover td { background: var(--surface-hover); }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }
        .status-pending { background: rgba(251, 191, 36, 0.15); color: var(--warning); border: 1px solid rgba(251, 191, 36, 0.3); }
        .status-confirmed { background: rgba(96, 165, 250, 0.15); color: var(--info); border: 1px solid rgba(96, 165, 250, 0.3); }
        .status-picked_up { background: rgba(167, 139, 250, 0.15); color: var(--violet); border: 1px solid rgba(167, 139, 250, 0.3); }
        .status-processing { background: rgba(102, 126, 234, 0.15); color: var(--primary); border: 1px solid rgba(102, 126, 234, 0.3); }
        .status-ready { background: rgba(74, 222, 128, 0.15); color: var(--success); border: 1px solid rgba(74, 222, 128, 0.3); }
        .status-out_for_delivery { background: rgba(240, 147, 251, 0.15); color: var(--accent); border: 1px solid rgba(240, 147, 251, 0.3); }
        .status-delivered { background: rgba(74, 222, 128, 0.15); color: var(--success); border: 1px solid rgba(74, 222, 128, 0.3); }
        .status-cancelled { background: rgba(248, 113, 113, 0.15); color: var(--danger); border: 1px solid rgba(248, 113, 113, 0.3); }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--ink-soft);
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state-text { font-size: 15px; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1500;
            padding: 20px;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-content {
            width: 520px;
            max-width: 100%;
            max-height: 88vh;
            overflow-y: auto;
            padding: 28px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .modal-title { font-size: 20px; font-weight: 800; }
        .close-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--surface);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .close-btn:hover { background: var(--danger); color: white; }

        /* Pipeline */
        .pipeline {
            display: flex;
            align-items: center;
            overflow-x: auto;
            padding: 20px 10px;
        }
        .pipeline-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            min-width: 80px;
        }
        .pipeline-icon {
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            background: var(--surface);
            border: 2px solid var(--border);
            transition: all 0.3s;
        }
        .pipeline-step.done .pipeline-icon {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }
        .pipeline-step.current .pipeline-icon {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-color: transparent;
            color: white;
            animation: pulse 2s infinite;
        }
        .pipeline-label {
            font-size: 11px;
            text-align: center;
            color: var(--ink-soft);
            font-weight: 500;
        }
        .pipeline-step.current .pipeline-label { color: var(--primary); font-weight: 700; }
        .pipeline-line {
            width: 30px;
            height: 3px;
            background: var(--border);
            margin: 0 5px 25px;
            flex-shrink: 0;
        }
        .pipeline-line.done { background: var(--success); }

        /* Ticket style */
        .ticket {
            position: relative;
            padding: 20px;
        }
        .ticket-stub {
            border-top: 2px dashed var(--border);
            margin-top: 16px;
            padding-top: 16px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .app-shell { flex-direction: column; }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-left: none;
                border-bottom: 1px solid var(--border);
            }
            .nav-links { flex-direction: row; flex-wrap: wrap; }
            .nav-link { width: auto; }
        }
        @media (max-width: 600px) {
            .main-content { padding: 20px 16px; }
            .landing-title { font-size: 32px; }
        }
    </style>
</head>
<body>

    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    
    <div id="app" class="app-root"></div>
    <div id="toast-container" class="toast-container"></div>
    <div id="modal-root"></div>

            const steps = ["خدمت", "آیتم‌ها", "آدرس", "زمان", "بررسی", "پرداخت"];
            
            let content = '';
            if (w.step === 0) {
                content = `
                    <div class="content-grid">
                        ${SERVICES.map(s => `
                            <div class="glass-card item-card" data-action="select-service" data-id="${s.id}" style="flex-direction:column;align-items:flex-start;cursor:pointer;${w.service === s.id ? 'border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-glow);' : ''}">
                                <div style="font-size:36px;margin-bottom:10px;">${s.icon}</div>
                                <div style="font-weight:700;font-size:15px;">${s.name}</div>
                                <div style="font-size:12px;color:var(--ink-soft);margin-top:5px;">${s.desc}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (w.step === 1) {
                const availableItems = ITEMS.filter(it => state.prices[w.service][it.id] !== undefined);
                content = `
                    <div class="content-grid">
                        ${availableItems.map(it => `
                            <div class="glass-card item-card">
                                <div>
                                    <div style="font-size:28px;">${it.icon}</div>
                                    <div style="font-weight:700;margin-top:5px;">${it.name}</div>
                                    <div class="mono" style="font-size:12px;color:var(--ink-soft);">${toman(state.prices[w.service][it.id])}</div>
                                </div>
                                <div class="qty-controls">
                                    <button class="qty-btn" data-action="qty-minus" data-id="${it.id}">−</button>
                                    <span class="qty-display">${w.qty[it.id] || 0}</span>
                                    <button class="qty-btn" data-action="qty-plus" data-id="${it.id}">+</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (w.step === 2) {
                content = `
                    <div style="max-width:500px;">
                        <div style="display:flex;gap:10px;margin-bottom:20px;">
                            <button class="btn ${w.addrMode === 'existing' ? 'btn-primary' : 'btn-ghost'} btn-sm" data-action="addr-mode" data-mode="existing">آدرس‌های ذخیره‌شده</button>
                            <button class="btn ${w.addrMode === 'new' ? 'btn-primary' : 'btn-ghost'} btn-sm" data-action="addr-mode" data-mode="new">آدرس جدید</button>
                        </div>
                        ${w.addrMode === 'existing' ? `
                            <div style="display:flex;flex-direction:column;gap:10px;">
                                ${customer.addresses.map(a => `
                                    <label class="glass-card" style="padding:16px;display:flex;gap:12px;cursor:pointer;${w.addressId === a.id ? 'border-color:var(--primary);' : ''}">
                                        <input type="radio" name="addr" ${w.addressId === a.id ? 'checked' : ''} data-action="select-addr" data-id="${a.id}">
                                        <div>
                                            <div style="font-size:14px;">${a.text}${a.unit ? ' - ' + a.unit : ''}</div>
                                            <div style="font-size:12px;color:var(--ink-soft);margin-top:4px;">${(state.coverageAreas.find(x => x.id === a.areaId) || {}).name}</div>
                                        </div>
                                    </label>
                                `).join('')}
                            </div>
                        ` : `
                            <div style="display:flex;flex-direction:column;gap:14px;">
                                <div>
                                    <label class="label">منطقه تحت پوشش</label>
                                    <select class="select" data-field="newArea">
                                        <option value="">— انتخاب کنید —</option>
                                        ${state.coverageAreas.filter(a => a.active).map(a => `<option value="${a.id}" ${w.newArea == a.id ? 'selected' : ''}>${a.name}</option>`).join('')}
                                    </select>
                                </div>
                                <div>
                                    <label class="label">آدرس کامل</label>
                                    <textarea class="textarea" rows="2" data-field="newAddrText" placeholder="خیابان، کوچه، پلاک...">${w.newAddrText}</textarea>
                                </div>
                                <div>
                                    <label class="label">واحد / طبقه</label>
                                    <input class="input" data-field="newAddrUnit" value="${w.newAddrUnit}">
                                </div>
                            </div>
                        `}
                    </div>
                `;
            } else if (w.step === 3) {
                content = `
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:600px;">
                        <div class="glass-card" style="padding:20px;">
                            <h4 style="margin-bottom:14px;">🚴 زمان دریافت</h4>
                            <label class="label">تاریخ</label>
                            <input type="date" class="input" data-field="pickupDate" value="${w.pickupDate}" min="${todayISODate()}" style="margin-bottom:12px;">
                            <label class="label">بازه زمانی</label>
                            <select class="select" data-field="pickupSlot">
                                ${TIME_SLOTS.map(t => `<option ${w.pickupSlot === t ? 'selected' : ''}>${t}</option>`).join('')}
                            </select>
                        </div>
                        <div class="glass-card" style="padding:20px;">
                            <h4 style="margin-bottom:14px;">🚚 زمان تحویل</h4>
                            <label class="label">تاریخ</label>
                            <input type="date" class="input" data-field="deliveryDate" value="${w.deliveryDate}" min="${w.pickupDate}" style="margin-bottom:12px;">
                            <label class="label">بازه زمانی</label>
                            <select class="select" data-field="deliverySlot">
                                ${TIME_SLOTS.map(t => `<option ${w.deliverySlot === t ? 'selected' : ''}>${t}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                `;
            } else if (w.step === 4) {
                const items = Object.entries(w.qty).filter(([,v]) => v > 0).map(([id, q]) => ({ itemId: id, qty: q }));
                const subtotal = items.reduce((s, it) => s + it.qty * (state.prices[w.service][it.itemId] || 0), 0);
                const discount = w.appliedCode ? (w.appliedCode.type === 'percent' ? Math.round(subtotal * w.appliedCode.value / 100) : Math.min(w.appliedCode.value, subtotal)) : 0;
                const total = Math.max(0, subtotal - discount);
                content = `
                    <div class="glass-card ticket" style="max-width:500px;">
                        <h4 style="margin-bottom:14px;">خلاصه سفارش</h4>
                        <div style="font-size:14px;display:flex;flex-direction:column;gap:6px;">
                            <div>خدمت: ${serviceName(w.service)}</div>
                            ${items.map(it => `<div>${itemName(it.itemId)} × ${it.qty}</div>`).join('')}
                        </div>
                        <div class="ticket-stub">
                            <label class="label">کد تخفیف</label>
                            <div style="display:flex;gap:8px;">
                                <input class="input" data-field="discountInput" value="${w.discountInput}" placeholder="مثلاً WELCOME20">
                                <button class="btn btn-ghost btn-sm" data-action="apply-discount">اعمال</button>
                            </div>
                            ${w.appliedCode ? `<div style="color:var(--success);font-size:13px;margin-top:8px;">✓ کد "${w.appliedCode.code}" اعمال شد</div>` : ''}
                        </div>
                        <div class="ticket-stub">
                            <div style="display:flex;justify-content:space-between;"><span>جمع جزء</span><b class="mono">${toman(subtotal)}</b></div>
                            ${discount > 0 ? `<div style="display:flex;justify-content:space-between;color:var(--success);margin-top:4px;"><span>تخفیف</span><b class="mono">- ${toman(discount)}</b></div>` : ''}
                            <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:800;margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);"><span>مبلغ نهایی</span><span class="mono" style="color:var(--primary);">${toman(total)}</span></div>
                        </div>
                    </div>
                `;
            } else if (w.step === 5) {
                const items = Object.entries(w.qty).filter(([,v]) => v > 0).map(([id, q]) => ({ itemId: id, qty: q }));
                const subtotal = items.reduce((s, it) => s + it.qty * (state.prices[w.service][it.itemId] || 0), 0);
                const discount = w.appliedCode ? (w.appliedCode.type === 'percent' ? Math.round(subtotal * w.appliedCode.value / 100) : Math.min(w.appliedCode.value, subtotal)) : 0;
                const total = Math.max(0, subtotal - discount);
                content = `
                    <div style="max-width:500px;">
                        <div style="display:flex;gap:10px;margin-bottom:20px;">
                            <label class="glass-card" style="flex:1;padding:16px;cursor:pointer;display:flex;align-items:center;gap:10px;${w.payMethod === 'online' ? 'border-color:var(--primary);' : ''}">
                                <input type="radio" name="pay" ${w.payMethod === 'online' ? 'checked' : ''} data-action="pay-method" data-method="online"> 💳 پرداخت آنلاین
                            </label>
                            <label class="glass-card" style="flex:1;padding:16px;cursor:pointer;display:flex;align-items:center;gap:10px;${w.payMethod === 'cod' ? 'border-color:var(--primary);' : ''}">
                                <input type="radio" name="pay" ${w.payMethod === 'cod' ? 'checked' : ''} data-action="pay-method" data-method="cod"> 💰 درب منزل
                            </label>
                        </div>
                        <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:800;margin-top:20px;">
                            <span>مبلغ نهایی</span><span class="mono" style="color:var(--primary);">${toman(total)}</span>
                        </div>
                    </div>
                `;
            }

            const hasItems = Object.values(w.qty).some(v => v > 0);
            const canNext = w.step === 0 ? !!w.service :
                            w.step === 1 ? hasItems :
                            w.step === 2 ? (w.addrMode === 'existing' ? !!w.addressId : (w.newArea && w.newAddrText.trim())) :
                            true;

            return `
                <div class="stepper">
                    ${steps.map((s, i) => `
                        ${i > 0 ? `<div class="step-line ${i <= w.step ? 'done' : ''}"></div>` : ''}
                        <div class="step ${i < w.step ? 'done' : ''} ${i === w.step ? 'active' : ''}">
                            <div class="step-number">${i < w.step ? '✓' : i + 1}</div>
                            <div class="step-label">${s}</div>
                        </div>
                    `).join('')}
                </div>
                <div style="margin-bottom:30px;">${content}</div>
                <div style="display:flex;justify-content:space-between;margin-top:30px;">
                    <button class="btn btn-ghost" ${w.step === 0 ? 'disabled' : ''} data-action="wizard-prev">مرحله قبل</button>
                    ${w.step < 5 ? 
                        `<button class="btn btn-primary" ${!canNext ? 'disabled' : ''} data-action="wizard-next">مرحله بعد</button>` :
                        `<button class="btn btn-accent" data-action="place-order">ثبت و پرداخت سفارش</button>`
                    }
                </div>
            `;
        }

        // ============ CUSTOMER ORDERS ============
        function renderCustomerOrders(customer) {
            const myOrders = state.orders.filter(o => o.customerId === customer.id).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
            const active = myOrders.filter(o => !['delivered', 'cancelled'].includes(o.status));
            const history = myOrders.filter(o => ['delivered', 'cancelled'].includes(o.status));
            
            return `
                <div>
                    <div style="display:flex;gap:10px;margin-bottom:20px;">
                        <div style="flex:1;">
                            <h3 style="margin-bottom:12px;">سفارش‌های جاری (${active.length})</h3>
                            ${active.length === 0 ? renderEmpty('سفارش جاری ندارید') : `
                                <div class="content-grid">
                                    ${active.map(o => renderOrderCard(o)).join('')}
                                </div>
                            `}
                        </div>
                    </div>
                    <div style="margin-top:30px;">
                        <h3 style="margin-bottom:12px;">تاریخچه (${history.length})</h3>
                        ${history.length === 0 ? renderEmpty('تاریخچه‌ای نیست') : `
                            <div class="content-grid">
                                ${history.map(o => renderOrderCard(o)).join('')}
                            </div>
                        `}
                    </div>
                </div>
            `;
        }

        function renderOrderCard(order) {
            return `

                        <div>
                            <div class="mono" style="font-weight:700;">${order.id}</div>
                            <div style="font-size:12px;color:var(--ink-soft);margin-top:4px;">${serviceName(order.service)} · ${order.items.reduce((s,i) => s+i.qty, 0)} قطعه</div>
                        </div>
                        <span class="status-badge status-${order.status}">${STATUS_META[order.status].icon} ${STATUS_META[order.status].label}</span>

                        <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:15px;font-weight:700;color:var(--ink);">
                            <span>مبلغ</span><span class="mono" style="color:var(--primary);">${toman(order.total)}</span>
                        </div>
                    </div>

        function renderSubscription(customer) {
            const current = customer.subscription && new Date(customer.subscription.expiresAt) > new Date() ? customer.subscription : null;
            return `

                            <div style="display:flex;align-items:center;gap:10px;font-weight:700;">
                                ⭐ اشتراک «${(state.plans.find(p => p.id === current.planId) || {}).name}» فعال است
                            </div>
                            <div style="font-size:13px;color:var(--ink-soft);margin-top:6px;">تاریخ انقضا: ${faDate(current.expiresAt)}</div>
                        </div>
                    ` : ''}
                    <div class="content-grid">
                        ${state.plans.map(p => `
                            <div class="glass-card ticket">
                                <h3 style="font-size:18px;">${p.name}</h3>
                                <div class="mono" style="font-size:24px;font-weight:800;color:var(--primary);margin:10px 0;">${toman(p.price)}</div>
                                <div style="font-size:13px;color:var(--ink-soft);margin-bottom:14px;">${p.durationDays} روز · ٪${p.discountPercent} تخفیف</div>
                                <ul style="list-style:none;padding:0;margin-bottom:16px;">

                                <button class="btn btn-accent" style="width:100%;" data-action="buy-plan" data-id="${p.id}" ${current && current.planId === p.id ? 'disabled' : ''}>

                            </div>

                    </div>
                </div>
            `;
        }

        // ============ ADMIN PAGES ============

            const revenue = state.orders.filter(o => o.status !== 'cancelled').reduce((s,o) => s + o.total, 0);

            return `
                <div class="stats-grid">

                ${todays.length === 0 ? renderEmpty('امروز سفارشی ثبت نشده') : `

                    <button class="btn btn-primary btn-sm" data-action="new-discount">➕ کد تخفیف جدید</button>

                        <div class="glass-card" style="padding:20px;">
                            <h3 style="font-weight:700;">${p.name}</h3>

        // ============ SALES REPORT ============
        function renderAdminSalesReport() {
            // 1. نمودار میله‌ای درآمد ۷ روز اخیر
            const days = [...Array(7)].map((_, i) => {
                const d = new Date(); d.setDate(d.getDate() - (6 - i));
                return d.toISOString().slice(0, 10);
            });
            const chartData = days.map(d => ({
                day: new Date(d).toLocaleDateString('fa-IR', { weekday: 'short' }),
                revenue: state.orders.filter(o => o.createdAt.slice(0, 10) === d && o.status !== 'cancelled').reduce((s, o) => s + o.total, 0)
            }));
            const maxRev = Math.max(...chartData.map(d => d.revenue), 1);

            // 2. نمودار دایره‌ای وضعیت سفارش‌ها
            const statusData = Object.keys(STATUS_META).map(s => ({
                name: STATUS_META[s].label,
                value: state.orders.filter(o => o.status === s).length
            })).filter(d => d.value > 0);
            
            const pieColors = ['#667eea', '#f093fb', '#4ade80', '#fbbf24', '#f87171', '#60a5fa', '#a78bfa'];
            let gradientStr = '';
            let cumulativePercent = 0;
            const totalStatus = statusData.reduce((s, d) => s + d.value, 0);
            
            statusData.forEach((d, i) => {
                const percent = (d.value / totalStatus) * 100;
                gradientStr += `${pieColors[i % pieColors.length]} ${cumulativePercent}% ${cumulativePercent + percent}%`;
                if (i < statusData.length - 1) gradientStr += ', ';
                cumulativePercent += percent;
            });

            // 3. نمودار افقی درآمد خدمات
            const serviceData = SERVICES.map(s => ({
                name: s.name,
                value: state.orders.filter(o => o.service === s.id).reduce((sum, o) => sum + o.total, 0)
            }));
            const maxService = Math.max(...serviceData.map(s => s.value), 1);

            return `
                <div style="display: flex; flex-direction: column; gap: 24px;">
                    <!-- نمودار میله‌ای درآمد -->
                    <div class="glass-card" style="padding: 24px;">
                        <h3 style="margin-bottom: 20px; font-size: 16px; display:flex; align-items:center; gap:8px;">📈 درآمد ۷ روز اخیر</h3>
                        <div style="display: flex; align-items: flex-end; justify-content: space-around; height: 220px; gap: 10px; padding: 0 10px; border-bottom: 1px solid var(--border);">
                            ${chartData.map((d, i) => `
                                <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; height: 100%; justify-content: flex-end;">
                                    <div style="font-size: 11px; color: var(--ink-soft);">${d.revenue > 0 ? toman(d.revenue).replace(' تومان', '') : ''}</div>
                                    <div style="width: 100%; max-width: 40px; height: ${(d.revenue / maxRev) * 100}%; min-height: 4px; background: linear-gradient(180deg, var(--accent) 0%, var(--primary) 100%); border-radius: 8px 8px 0 0; box-shadow: 0 0 15px var(--primary-glow); transition: height 0.5s ease;"></div>
                                    <div style="font-size: 12px; font-weight: 600;">${d.day}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- نمودار دایره‌ای و افقی -->
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                        <!-- نمودار دونات وضعیت‌ها -->
                        <div class="glass-card" style="padding: 24px;">
                            <h3 style="margin-bottom: 20px; font-size: 16px; display:flex; align-items:center; gap:8px;">🍩 توزیع وضعیت سفارش‌ها</h3>
                            <div style="display: flex; align-items: center; gap: 20px;">
                                <div style="width: 160px; height: 160px; border-radius: 50%; background: conic-gradient(${gradientStr}); position: relative; flex-shrink: 0; box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);">
                                    <div style="position: absolute; inset: 25px; background: var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; border: 1px solid var(--border);">
                                        <div style="font-size: 22px; font-weight: 800;">${totalStatus}</div>
                                        <div style="font-size: 11px; color: var(--ink-soft);">کل سفارش</div>
                                    </div>
                                </div>
                                <div style="display: flex; flex-direction: column; gap: 10px; flex: 1;">
                                    ${statusData.map((d, i) => `
                                        <div style="display: flex; align-items: center; gap: 8px; font-size: 13px;">
                                            <div style="width: 12px; height: 12px; border-radius: 4px; background: ${pieColors[i % pieColors.length]}; box-shadow: 0 0 8px ${pieColors[i % pieColors.length]}80;"></div>
                                            <span style="flex: 1;">${d.name}</span>
                                            <span class="mono" style="font-weight: 700;">${d.value}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>

                        <!-- نمودار درآمد خدمات -->
                        <div class="glass-card" style="padding: 24px;">
                            <h3 style="margin-bottom: 20px; font-size: 16px; display:flex; align-items:center; gap:8px;">💎 درآمد به تفکیک خدمت</h3>
                            <div style="display: flex; flex-direction: column; gap: 18px;">
                                ${serviceData.map((s, i) => `
                                    <div>
                                        <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px;">
                                            <span>${s.name}</span>
                                            <b class="mono">${toman(s.value)}</b>
                                        </div>
                                        <div style="height: 10px; background: var(--surface); border-radius: 10px; overflow: hidden; border: 1px solid var(--border);">
                                            <div style="height: 100%; width: ${(s.value / maxService) * 100}%; background: linear-gradient(90deg, ${pieColors[i % pieColors.length]}, ${pieColors[(i+1) % pieColors.length]}); border-radius: 10px; box-shadow: 0 0 10px ${pieColors[i % pieColors.length]}60; transition: width 0.5s ease;"></div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function attachWizardListeners(customer) {
            document.querySelectorAll('[data-action="select-service"]').forEach(el => {
                el.onclick = () => {

                    state.wizard.qty = {};
                    render();
                };
            });
            document.querySelectorAll('[data-action="qty-plus"]').forEach(el => {
                el.onclick = () => {
                    const id = el.dataset.id;
                    state.wizard.qty[id] = (state.wizard.qty[id] || 0) + 1;
                    render();
                };
            });
            document.querySelectorAll('[data-action="qty-minus"]').forEach(el => {
                el.onclick = () => {
                    const id = el.dataset.id;
                    state.wizard.qty[id] = Math.max(0, (state.wizard.qty[id] || 0) - 1);
                    render();
                };
            });
            document.querySelectorAll('[data-action="addr-mode"]').forEach(el => {
                el.onclick = () => {
                    state.wizard.addrMode = el.dataset.mode;
                    render();
                };
            });
            document.querySelectorAll('[data-action="select-addr"]').forEach(el => {
                el.onchange = () => {
                    state.wizard.addressId = el.dataset.id;
                    render();
                };
            });
            document.querySelectorAll('[data-field]').forEach(el => {
                el.oninput = () => {
                    state.wizard[el.dataset.field] = el.value;
                };
                el.onchange = () => {
                    state.wizard[el.dataset.field] = el.value;
                };
            });
            document.querySelectorAll('[data-action="wizard-next"]').forEach(el => {
                el.onclick = () => {
                    if (state.wizard.step === 2 && state.wizard.addrMode === 'existing') {
                        if (!state.wizard.addressId) return notify('آدرس را انتخاب کنید', 'error');
                    }
                    state.wizard.step += 1;
                    render();
                };
            });
            document.querySelectorAll('[data-action="wizard-prev"]').forEach(el => {
                el.onclick = () => {
                    state.wizard.step -= 1;
                    render();
                };
            });
            document.querySelectorAll('[data-action="apply-discount"]').forEach(el => {
                el.onclick = () => {
                    const code = state.wizard.discountInput.trim().toUpperCase();
                    if (!code) return;
                    const found = state.discountCodes.find(d => d.code === code);
                    if (!found) return notify('کد تخفیف یافت نشد', 'error');
                    if (!found.active) return notify('کد غیرفعال است', 'error');
                    state.wizard.appliedCode = found;
                    notify('کد تخفیف اعمال شد');
                    render();
                };
            });
            document.querySelectorAll('[data-action="pay-method"]').forEach(el => {
                el.onchange = () => {
                    state.wizard.payMethod = el.dataset.method;
                    render();
                };
            });
            document.querySelectorAll('[data-action="place-order"]').forEach(el => {
                el.onclick = () => {
                    const w = state.wizard;
                    const items = Object.entries(w.qty).filter(([,v]) => v > 0).map(([id, q]) => ({ itemId: id, qty: q }));
                    const subtotal = items.reduce((s, it) => s + it.qty * (state.prices[w.service][it.itemId] || 0), 0);
                    const discount = w.appliedCode ? (w.appliedCode.type === 'percent' ? Math.round(subtotal * w.appliedCode.value / 100) : Math.min(w.appliedCode.value, subtotal)) : 0;
                    
                    let addressText = '';
                    if (w.addrMode === 'existing') {
                        const a = customer.addresses.find(x => x.id === w.addressId);
                        addressText = a ? `${a.text}${a.unit ? ' - ' + a.unit : ''}` : '';
                    } else {
                        const areaName = (state.coverageAreas.find(a => String(a.id) === String(w.newArea)) || {}).name || '';
                        addressText = `${w.newAddrText}${w.newAddrUnit ? ' - ' + w.newAddrUnit : ''} (${areaName})`;
                    }

                    const order = {
                        id: nextOrderCode(),
                        customerId: customer.id,
                        service: w.service,
                        items,
                        address: addressText,
                        pickupDate: w.pickupDate, pickupSlot: w.pickupSlot,
                        deliveryDate: w.deliveryDate, deliverySlot: w.deliverySlot,
                        discountCode: w.appliedCode ? w.appliedCode.code : null,
                        subtotal, discount,
                        total: Math.max(0, subtotal - discount),
                        status: 'pending',
                        courierId: null,
                        paymentMethod: w.payMethod,
                        createdAt: new Date().toISOString(),
                        review: null,
                    };
                    state.orders.unshift(order);
                    w.done = order;
                    notify('سفارش با موفقیت ثبت شد');
                    render();
                };
            });
            document.querySelectorAll('[data-action="new-order-reset"]').forEach(el => {
                el.onclick = () => {
                    state.wizard = {
                        step: 0, service: null, qty: {},
                        addrMode: 'existing', addressId: '',
                        newArea: '', newAddrText: '', newAddrUnit: '',
                        pickupDate: todayISODate(), pickupSlot: TIME_SLOTS[0],
                        deliveryDate: todayISODate(), deliverySlot: TIME_SLOTS[1],
                        discountInput: '', appliedCode: null, payMethod: 'online', done: null,
                    };
                    render();
                };
            });
        }

                <div class="glass-card modal-content" onclick="event.stopPropagation()">
                    <div class="modal-header">
                        <h3 class="modal-title">کد تخفیف جدید</h3>
                        <button class="close-btn" data-action="close-modal">✕</button>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:14px;">
                        <div><label class="label">کد</label><input class="input" id="d-code" placeholder="مثلاً WELCOME20"></div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                            <div><label class="label">نوع</label><select class="select" id="d-type"><option value="percent">درصدی</option><option value="fixed">مبلغ ثابت</option></select></div>
                            <div><label class="label">مقدار</label><input type="number" class="input" id="d-value" value="10"></div>
                        </div>
                        <div><label class="label">سقف استفاده</label><input type="number" class="input" id="d-limit" value="100"></div>
                        <button class="btn btn-primary" id="save-discount">ذخیره</button>
                    </div>
                </div>
            `;
            document.getElementById('modal-root').appendChild(modal);
            modal.onclick = () => closeModal();
            modal.querySelector('[data-action="close-modal"]').onclick = () => closeModal();
            modal.querySelector('#save-discount').onclick = () => {
                const code = document.getElementById('d-code').value.trim().toUpperCase();
                if (!code) return notify('کد الزامی است', 'error');
                state.discountCodes.push({
                    code,
                    type: document.getElementById('d-type').value,
                    value: Number(document.getElementById('d-value').value),
                    active: true,
                    usageLimit: Number(document.getElementById('d-limit').value),
                    used: 0,
                });
                notify('کد تخفیف اضافه شد');
                closeModal();
                render();
            };
        }

        function closeModal() {
            document.getElementById('modal-root').innerHTML = '';
        }

        // Initial render
        render();
    </script>
</body>
</html>
